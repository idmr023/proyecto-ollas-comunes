# ZAP Configuration for SIGO-OLLAS Security Testing
# This file is loaded by ZAP on startup

# General settings
scanner.maxAlertsPerRule=0
scanner.maxScanDurationInMins=60
connection.timeoutInSecs=120
connection.socketTimeoutInSecs=120

# Spider settings
spider.maxDuration=10
spider.maxChildren=0
spider.recurse=true
spider.threadCount=4

# Active Scan settings
ascan.maxDuration=60
ascan.maxRuleDurationInMins=5
ascan.threadCount=2

# AJAX Spider (for SPA/JavaScript heavy apps)
ajaxSpider.enabled=false

# Passive Scan - enable all
passiveScan.enabled=true
