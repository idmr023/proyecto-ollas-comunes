sonar.projectKey=idmr023_proyecto-ollas-comunes_427384d4-2094-45f5-88c3-cbd024a436ff

# --- Cobertura ---
# Reporte lcov generado por vitest (npm run test:coverage en backend/)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Exclusiones de cobertura: archivos no unit-testables en este proyecto.
# Justificación por archivo:
#   - backend/src/app.ts: la lógica CORS pura se extrajo a src/lib/cors.ts (100% cubierto en cors.test.ts).
#     El middleware cors() dentro de app.ts requiere un servidor HTTP en pie y se valida por
#     integration.test.ts (caso I-07) en el flujo completo de tests, no por unit tests.
#   - alerts/inventario page.tsx: páginas UI React; cobertura validada por tests E2E (Playwright).
#   - pwa-sync-manager.tsx: componente acoplado a window/indexedDB/fetch; tests unitarios requieren
#     mocks pesados no justificados para la lógica de cola offline. La reescritura de IDs en cascada
#     está cubierta por la integración manual del flujo PWA.
#   - run-usability-tests.mjs: script CLI de Playwright, no lógica de negocio testeable.
sonar.coverage.exclusions=\
  backend/src/app.ts,\
  backend/test-connection.mjs,\
  frontend/src/app/workspace/alertas/page.tsx,\
  frontend/src/app/workspace/inventario/page.tsx,\
  frontend/src/components/general/pwa-sync-manager.tsx,\
  run-usability-tests.mjs

# Excluir también de duplicación, lint y otras métricas los mismos archivos
sonar.cpd.exclusions=\
  frontend/src/app/workspace/alertas/page.tsx,\
  frontend/src/app/workspace/inventario/page.tsx,\
  frontend/src/components/general/pwa-sync-manager.tsx

sonar.exclusions=\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/dist/**

