# =============================================================
# PostgreSQL 15 - Configuracion del nodo REPLICA
# Alta Disponibilidad SIGO-OLLAS
# =============================================================
listen_addresses = '*'
port = 5433
max_connections = 100
shared_buffers = 128MB
dynamic_shared_memory_type = posix

# Replicacion - modo standby
wal_level = replica
hot_standby = on
hot_standby_feedback = on
primary_slot_name = 'replica_slot_1'

# Logging
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a '

# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'C.UTF-8'
lc_monetary = 'C.UTF-8'
lc_numeric = 'C.UTF-8'
lc_time = 'C.UTF-8'
